[package]
name = "chump-chassis"
description = "Production-ready Rust/Axum micro-SaaS skeleton"
version = "0.1.0"
authors = ["Jeff Adkins <jeff@chump.ai>"]
edition = "2021"

[dependencies]
axum = "0.6.20"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tower-http = { version = "0.3", features = ["cors", "trace"] }
