[package]
name = "chump-chassis"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.6.14"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0.147", features = ["derive"] }
serde_json = "1.0.92"
tower-http = { version = "0.3.3", features = ["cors", "trace"] }
sqlx = { version = "0.8.6", features = ["sqlite", "runtime-tokio-native-tls"] }
